<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Get in touch with Rapids Whitewater Rafting. Questions? Reservations? Contact us today!">
    <meta name="author" content="Your Full Name">
    <title>Contact Us | Rapids</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rapids Rafting Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero-contact.png" alt="Whitewater rafting team ready to help">
            <div class="hero-overlay">
                <h1>Contact Us</h1>
            </div>
        </div>

        <section class="contact-info">
            <h2>Our Location</h2>
            <div class="info-grid">
                <div>
                    <p><strong>Address:</strong><br>
                        123 River Run Lane<br>
                        Salmon, ID 83467</p>

                    <p><strong>Phone:</strong><br>
                        (208) 555-RAFT (7238)</p>

                    <p><strong>Email:</strong><br>
                        info@rapidsrafting.com</p>
                </div>

                <!-- Google Map -->
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2890.123456789!2d-113.123456789!3d45.123456789!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDXCsDA3JzM0LjAiTiAxMTPCsDA3JzM0LjAiVw!5e0!3m2!1sen!2sus!4v123456789"
                      allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </section>

        <!-- Team Section -->
        <section class="team">
            <h2>Meet Our Guides</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/guide1.jpg" alt="Sarah Chen - Lead Guide">
                    <figcaption><strong>Sarah Chen</strong><br>Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/guide2.jpg" alt="Mike Thompson - Safety Director">
                    <figcaption><strong>Mike Thompson</strong><br>Safety Director</figcaption>
                </figure>
                <figure>
                    <img src="images/guide3.jpg" alt="Elena Rodriguez - Trip Coordinator">
                    <figcaption><strong>Elena Rodriguez</strong><br>Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>

        <!-- Contact Form -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label>Purpose of Message</label>
                <div class="radio-group">
                    <label><input type="radio" name="purpose" value="general" required> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="website"> Website
                        Suggestion</label>
                </div>

                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <label class="checkbox-label">
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Rapids! | Your Full Name</p>
        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="X"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
